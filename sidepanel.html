<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LLM图片翻译助手 任务</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <main class="panel">
    <header class="panel-header">
      <div>
        <p class="eyebrow" data-i18n="panelEyebrow">任务面板</p>
        <h1 data-i18n="panelTitle">当前页图片翻译</h1>
      </div>
      <div class="header-actions">
        <button id="themeToggleButton" type="button">切换深色</button>
        <button id="refreshButton" data-i18n="refresh">刷新</button>
      </div>
    </header>

    <section class="card">
      <div class="service-switcher">
        <label class="service-switcher-label" for="serviceSelect" data-i18n="serviceSwitcherLabel">翻译服务</label>
        <div class="service-switcher-row">
          <select id="serviceSelect"></select>
        </div>
      </div>
      <div class="actions">
        <button id="excludeSiteButton">排除当前网站</button>
        <button id="restoreAllButton" data-i18n="restoreAllImages">恢复全部原图</button>
        <button id="openOptionsButton" data-i18n="openSettings">打开设置页</button>
      </div>
      <p id="summaryText" class="summary" data-i18n="sidepanelWaitingScan">等待扫描页面图片。</p>
    </section>

    <section class="card">
      <h2 data-i18n="recentTasks">最近任务</h2>
      <div id="taskList" class="task-list"></div>
    </section>
  </main>

  <script src="common.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
